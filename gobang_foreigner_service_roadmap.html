
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,'Anthropic Sans',sans-serif)}
.rm{padding:1rem 0}
.phases{display:flex;gap:4px;margin-bottom:1.5rem}
.phase-tab{flex:1;padding:10px 8px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;text-align:center;background:var(--color-background-primary);transition:all .2s}
.phase-tab:hover{background:var(--color-background-secondary)}
.phase-tab.active-0{background:#EEEDFE;border-color:#AFA9EC}
.phase-tab.active-1{background:#E6F1FB;border-color:#85B7EB}
.phase-tab.active-2{background:#E1F5EE;border-color:#5DCAA5}
.phase-tab.active-3{background:#FAEEDA;border-color:#FAC775}
@media(prefers-color-scheme:dark){
.phase-tab.active-0{background:#3C3489;border-color:#7F77DD}
.phase-tab.active-1{background:#0C447C;border-color:#378ADD}
.phase-tab.active-2{background:#085041;border-color:#1D9E75}
.phase-tab.active-3{background:#633806;border-color:#BA7517}
.phase-tab.active-0 .ph-name,.phase-tab.active-1 .ph-name,.phase-tab.active-2 .ph-name,.phase-tab.active-3 .ph-name{color:#fff}
.phase-tab.active-0 .ph-dur,.phase-tab.active-1 .ph-dur,.phase-tab.active-2 .ph-dur,.phase-tab.active-3 .ph-dur{color:rgba(255,255,255,.7)}
}
.ph-num{font-size:11px;color:var(--color-text-tertiary);margin-bottom:2px}
.ph-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.ph-dur{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.timeline-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;margin-bottom:1.5rem;background:var(--color-background-secondary)}
.tbar{height:100%;transition:opacity .2s}
.detail{display:none;animation:fadeIn .3s}
.detail.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.d-header{margin-bottom:16px}
.d-title{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.d-sub{font-size:13px;color:var(--color-text-secondary);margin-top:4px}
.d-goal{font-size:14px;color:var(--color-text-secondary);margin-top:8px;padding:10px 14px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);line-height:1.6}
.work-section{margin-bottom:16px}
.ws-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.task-card{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:6px;background:var(--color-background-primary)}
.task-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px}
.ti-0{background:#EEEDFE;color:#534AB7}
.ti-1{background:#E6F1FB;color:#185FA5}
.ti-2{background:#E1F5EE;color:#0F6E56}
.ti-3{background:#FAEEDA;color:#854F0B}
@media(prefers-color-scheme:dark){
.ti-0{background:#3C3489;color:#CECBF6}
.ti-1{background:#0C447C;color:#B5D4F4}
.ti-2{background:#085041;color:#9FE1CB}
.ti-3{background:#633806;color:#FAC775}
}
.task-body{flex:1;min-width:0}
.task-name{font-size:14px;font-weight:500;color:var(--color-text-primary);line-height:1.4}
.task-desc{font-size:12px;color:var(--color-text-secondary);margin-top:2px;line-height:1.5}
.done-badge{font-size:11px;padding:3px 8px;border-radius:var(--border-radius-md);background:var(--color-background-success);color:var(--color-text-success);white-space:nowrap;margin-top:1px}
.seo-badge{font-size:11px;padding:3px 8px;border-radius:var(--border-radius-md);background:var(--color-background-info);color:var(--color-text-info);white-space:nowrap;margin-top:1px}
.dep-line{font-size:12px;color:var(--color-text-tertiary);margin-top:10px;padding-top:10px;border-top:0.5px solid var(--color-border-tertiary)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-top:16px}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.metric-label{font-size:11px;color:var(--color-text-secondary)}
.metric-val{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-top:2px}
</style>
<div class="rm">
<div class="phases" id="tabs"></div>
<div class="timeline-bar" id="tbar"></div>
<div id="details"></div>
</div>

},

{name:"일본어(ja) 번역 추가",desc:"동일 구조. 서브디렉토리 /ja/ 경로 + hreflang 태그 확장",icon:"🇯🇵",seo:true},
{name:"기타 언어 기계번역 자동 적용",desc:"베트남어, 태국어 등. 전문 검수 없이 '자동 번역됨' 라벨로 가볍게 제공",icon:"🌐"}
]},
{title:"메신저 채널 확장",tasks:[
{name:"LINE 상담 채널 추가",desc:"일본/대만 사용자 대상. 매물 상세 페이지 메신저 선택에 추가",icon:"💚"},

{name:"메신저 선택 플로팅 버튼",desc:"사용자 언어/지역에 따라 기본 메신저 순서 자동 정렬",icon:"📲"}

]}

},
{id:3,name:"외국인 맞춤형",dur:"8~12주",color:["#FAC775","#BA7517"],pct:35,

{title:"해외 결제 + 앱 확장",tasks:[

{name:"App Store / Play Store ASO",desc:"영어/중국어/일본어 스토어 설명 작성. 앱스토어 검색 최적화",icon:"📦",seo:true},

let cur=0;
const $=id=>document.getElementById(id);

function render(){
let tabsH='';
P.forEach((p,i)=>{
tabsH+=`<div class="phase-tab ${i===cur?'active-'+i:''}" onclick="sel(${i})">
<div class="ph-num">Phase ${p.id}</div>
<div class="ph-name">${p.name}</div>
<div class="ph-dur">${p.dur}</div>
</div>`;
});
$('tabs').innerHTML=tabsH;

let barH='';
P.forEach((p,i)=>{
barH+=`<div class="tbar" style="width:${p.pct}%;background:${p.color[i===cur?1:0]};opacity:${i===cur?1:.5}"></div>`;
});
$('tbar').innerHTML=barH;

let dH='';
P.forEach((p,i)=>{
dH+=`<div class="detail ${i===cur?'show':''}" id="d${i}">
<div class="d-header">
<div class="d-title">Phase ${p.id}: ${p.name}</div>
<div class="d-sub">${p.dur} · 전체 중 ${p.pct}%</div>
<div class="d-goal">${p.goal}</div>
</div>`;
p.sections.forEach(s=>{
dH+=`<div class="work-section"><div class="ws-title">${s.title}</div>`;
s.tasks.forEach(t=>{
dH+=`<div class="task-card">
<div class="task-icon ti-${i}">${t.icon}</div>
<div class="task-body">
<div class="task-name">${t.name}</div>
<div class="task-desc">${t.desc}</div>
</div>
${t.seo?'<div class="seo-badge">SEO</div>':''}
</div>`;
});
dH+=`</div>`;
});
dH+=`<div class="metrics">`;
p.metrics.forEach(m=>{
dH+=`<div class="metric"><div class="metric-label">${m.l}</div><div class="metric-val">${m.v}</div></div>`;
});
dH+=`</div>`;
if(i<3){
dH+=`<div class="dep-line">→ 완료 후 Phase ${i+1}(${P[i+1].name})로 이행</div>`;
}
dH+=`</div>`;
});
$('details').innerHTML=dH;
}

function sel(i){cur=i;render();}
render();
</script>
