<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #1a1f3a;
            --sidebar-w: 176px;
            --active: #00c2a8;
            --active-bg: rgba(0,194,168,.15);
            --text-white: #ffffff;
            --text-dim: rgba(255,255,255,.45);
            --text-dimmer: rgba(255,255,255,.25);
            --main-bg: #f3f5f9;
            --surface: #ffffff;
            --border: #e8ecf4;
            --primary: #1a1f3a;
            --teal: #00c2a8;
            --blue: #3b82f6;
            --red: #ef4444;
            --orange: #f97316;
            --green: #22c55e;
            --green-dk: #16a34a;
            --muted: #94a3b8;
            --text: #1e2a3b;
            --font: 'Noto Sans KR', sans-serif;
            --mono: 'Space Mono', monospace;
            --sh: 0 1px 10px rgba(0,0,0,.06);
            --sh-md: 0 4px 20px rgba(0,0,0,.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font); background:var(--main-bg); color:var(--text); display:flex; min-height:100vh; font-size:13px; }
        .sidebar { width:var(--sidebar-w); background:var(--sidebar-bg); min-height:100vh; position:fixed; top:0; left:0; z-index:300; display:flex; flex-direction:column; box-shadow:2px 0 16px rgba(0,0,0,.25); }
        .sb-logo { padding:18px 16px 14px; border-bottom:1px solid rgba(255,255,255,.07); display:flex; align-items:center; gap:7px; }
        .logo-icon { width:32px; height:32px; border-radius:8px; background:linear-gradient(135deg,#00c2a8,#0077ff); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:900; color:#fff; }
        .logo-txt { font-size:15px; font-weight:900; color:#fff; letter-spacing:-.3px; }
        .sb-user { padding:12px 14px; border-bottom:1px solid rgba(255,255,255,.07); }
        .sb-user-name { display:flex; align-items:center; justify-content:space-between; font-size:14px; font-weight:800; color:#fff; margin-bottom:6px; cursor:pointer; }
        .sb-user-name-arrow { font-size:11px; color:var(--text-dimmer); }
        .sb-user-info { display:flex; flex-direction:column; gap:3px; }
        .sb-user-row { display:flex; align-items:center; gap:5px; }
        .sb-tag { padding:1px 6px; border-radius:3px; font-size:9px; font-weight:700; font-family:var(--mono); background:rgba(0,194,168,.2); color:var(--teal); }
        .sb-tag.tel { background:rgba(255,255,255,.08); color:var(--text-dim); }
        .sb-val { font-size:11px; color:var(--text-dim); }
        .sb-nav { flex:1; padding:8px 8px; display:flex; flex-direction:column; gap:1px; overflow-y:auto; }
        .nav-item { display:flex; align-items:center; gap:8px; padding:9px 10px; border-radius:8px; color:var(--text-dim); font-size:12.5px; font-weight:500; cursor:pointer; transition:all .18s; border:none; background:transparent; width:100%; text-align:left; font-family:var(--font); }
        .nav-item:hover { background:rgba(255,255,255,.06); color:rgba(255,255,255,.8); }
        .nav-item.active { background:var(--active-bg); color:var(--teal); font-weight:700; }
        .nav-item-icon { width:18px; text-align:center; font-size:13px; flex-shrink:0; }
        .nav-item-arrow { margin-left:auto; font-size:10px; color:var(--text-dimmer); }
        .main { margin-left:var(--sidebar-w); flex:1; display:flex; flex-direction:column; min-width:0; }
        .topbar { height:50px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:flex-end; padding:0 24px; gap:10px; position:sticky; top:0; z-index:100; box-shadow:0 1px 6px rgba(0,0,0,.04); }
        .topbar-bell { width:32px; height:32px; border-radius:8px; background:var(--main-bg); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:14px; cursor:pointer; position:relative; }
        .topbar-bell::after { content:''; position:absolute; top:5px; right:6px; width:7px; height:7px; background:#f97316; border-radius:50%; border:2px solid var(--surface); }
        .topbar-user { display:flex; align-items:center; gap:7px; padding:5px 10px; border-radius:8px; background:var(--main-bg); border:1px solid var(--border); cursor:pointer; font-size:12px; font-weight:600; color:var(--text); }
        .topbar-avatar { width:24px; height:24px; border-radius:50%; background:linear-gradient(135deg,#00c2a8,#0077ff); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:#fff; flex-shrink:0; }
        .content { padding:24px 24px 60px; flex:1; }
        .page-title { font-size:22px; font-weight:900; letter-spacing:-.6px; margin-bottom:4px; }
        .page-sub { font-size:12px; color:var(--muted); margin-bottom:20px; }
        .quick-stats { display:flex; gap:8px; margin-bottom:22px; flex-wrap:wrap; }
        .qs-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 16px; min-width:100px; cursor:pointer; transition:all .18s; box-shadow:var(--sh); display:flex; flex-direction:column; align-items:center; gap:4px; }
        .qs-card:hover { transform:translateY(-1px); box-shadow:var(--sh-md); }
        .qs-icon { font-size:18px; }
        .qs-label { font-size:10px; color:var(--muted); font-weight:600; white-space:nowrap; }
        .qs-value { font-size:17px; font-weight:900; font-family:var(--mono); letter-spacing:-.5px; }
        .qs-value.warn { color:var(--orange); }
        .branch-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
        .branch-title { font-size:14px; font-weight:900; letter-spacing:-.4px; display:flex; align-items:center; gap:6px; }
        .branch-badge { width:20px; height:20px; background:var(--primary); border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:#fff; font-family:var(--mono); }
        .branch-search { flex:1; max-width:280px; display:flex; align-items:center; gap:6px; padding:7px 12px; background:var(--surface); border:1px solid var(--border); border-radius:8px; font-size:12px; color:var(--muted); }
        .branch-search input { border:none; outline:none; background:transparent; font-size:12px; color:var(--text); font-family:var(--font); flex:1; }
        .view-toggle { display:flex; background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-left:auto; }
        .view-btn { display:flex; align-items:center; gap:4px; padding:7px 12px; font-size:11px; font-weight:600; cursor:pointer; border:none; background:transparent; color:var(--muted); font-family:var(--font); transition:all .15s; white-space:nowrap; }
        .view-btn.active { background:var(--primary); color:#fff; }
        .btn-register { display:flex; align-items:center; gap:5px; padding:8px 14px; background:var(--primary); border:none; border-radius:8px; color:#fff; font-size:12px; font-weight:700; font-family:var(--font); cursor:pointer; transition:all .18s; white-space:nowrap; }
        .branch-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; margin-bottom:24px; }
        .bc { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; box-shadow:var(--sh); transition:all .22s; display:flex; flex-direction:column; }
        .bc-head { padding:14px 14px 10px; }
        .bc-name { font-size:14px; font-weight:800; letter-spacing:-.4px; }
        .bc-addr { font-size:10px; color:var(--muted); margin-top:2px; }
        .bc-chips { display:flex; gap:4px; flex-wrap:wrap; margin-top:8px; }
        .chip { display:inline-flex; align-items:center; gap:2px; padding:2px 7px; border-radius:3px; font-size:9px; font-weight:700; }
        .chip-green { background:#dcfce7; color:#15803d; }
        .chip-red { background:#fee2e2; color:#b91c1c; }
        .chip-orange { background:#fff7ed; color:#c2410c; }
        .bc-perf { margin:0 14px 10px; background:#f8fafc; border:1px solid var(--border); border-radius:8px; padding:10px 12px; }
        .bc-stats { display:grid; grid-template-columns:repeat(4, 1fr); border-top:1px solid var(--border); }
        .stat-col { padding:10px 10px 8px; border-right:1px solid var(--border); }
        .stat-col:last-child { border-right:none; }
        .stat-lbl { font-size:9px; color:var(--muted); font-weight:600; margin-bottom:5px; }
        .stat-val { font-size:12px; font-weight:800; letter-spacing:-.3px; }
        .bc-nav { display:grid; grid-template-columns:repeat(3, 1fr); border-top:1px solid var(--border); }
        .bc-nav-btn { display:flex; align-items:center; justify-content:center; gap:4px; padding:10px 6px; border:none; background:transparent; font-size:11px; font-weight:700; color:var(--muted); cursor:pointer; }
        .bottom-grid { display:grid; grid-template-columns:1fr 360px; gap:12px; }
        .panel { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px 18px; box-shadow:var(--sh); }
        .panel-title { font-size:13px; font-weight:800; letter-spacing:-.3px; margin-bottom:14px; }
        .feed-item { display:flex; align-items:flex-start; gap:8px; padding:9px 6px; border-bottom:1px solid var(--border); cursor:pointer; border-radius:7px; transition:background .15s; }
        .feed-txt { font-size:12px; font-weight:600; line-height:1.5; flex:1; }
        .quick-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .q-item { display:flex; align-items:center; gap:9px; padding:11px 12px; background:var(--main-bg); border:1px solid var(--border); border-radius:10px; cursor:pointer; font-family:var(--font); }
        .q-lbl { font-size:12px; font-weight:700; }
        .banner { background:linear-gradient(135deg,#1a1f3a,#2d3561); border-radius:12px; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; color:#fff; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sb-logo">
            <div class="logo-icon">U</div>
            <div class="logo-txt">U Dashboard</div>
        </div>
        <div class="sb-user">
            <div class="sb-user-name">gobang123 <span class="sb-user-name-arrow">▼</span></div>
            <div class="sb-user-info">
                <div class="sb-user-row"><span class="sb-tag">Admin</span><span class="sb-val">Super User</span></div>
                <div class="sb-user-row"><span class="sb-tag tel">TEL</span><span class="sb-val">010-1234-5678</span></div>
            </div>
        </div>
        <nav class="sb-nav">
            <button class="nav-item active">Dashboard</button>
            <button class="nav-item">Branches</button>
            <button class="nav-item">Analytics</button>
            <button class="nav-item">Settings</button>
        </nav>
    </aside>
    <div class="main">
        <div class="topbar">
            <div class="topbar-bell"></div>
            <div class="topbar-user">
                <div class="topbar-avatar">AD</div>
                <span>Administrator</span>
            </div>
        </div>
        <div class="content">
            <div class="page-title">Dashboard Overview</div>
            <div class="page-sub">Welcome back, Admin!</div>
            <div class="quick-stats">
                <div class="qs-card"><div class="qs-label">Total Branches</div><div class="qs-value">12</div></div>
                <div class="qs-card"><div class="qs-label">Active Users</div><div class="qs-value">1,240</div></div>
                <div class="qs-card"><div class="qs-label">Monthly Revenue</div><div class="qs-value warn">₩45.2M</div></div>
            </div>
            <div class="branch-grid">
                <!-- Sample Branch Cards -->
                <div class="bc">
                    <div class="bc-head">
                        <div class="bc-name">Gangnam Branch</div>
                        <div class="bc-addr">Teheran-ro, Seoul</div>
                        <div class="bc-chips"><span class="chip chip-green">Active</span></div>
                    </div>
                    <div class="bc-stats">
                        <div class="stat-col"><div class="stat-lbl">Views</div><div class="stat-val">1.2K</div></div>
                        <div class="stat-col"><div class="stat-lbl">Sales</div><div class="stat-val">₩15M</div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
</html>
